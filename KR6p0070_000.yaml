body:
  text: 淨土生無生論注序生無生論者有門大師興無緣慈借虗空舌為往生居士之所説也如風鼓橐不日而成義立十門理融一念指漚示海生即無生即性明心佛非他佛真可謂善明佛智者矣居士作序鋟梓流通海內緇素莫不家傳戶習以為往生左券焉寂慮科文異帙不便披尋頃因會次謬注數言聊資初學一往而視似乎虗尚多駢然所引悉經疏成言未嘗妄加己意倘不以蛇足見鄙未必不為斯文之一助也萬曆壬子秋七月僧自恣日浮石門人正寂和南序
